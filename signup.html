<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="static.css">
</head>
<body>
    <div class="forms">
        <h2>Join the Zone</h2>
        
        <form action="" autocomplete="on" id="registerForm" onsubmit="return validategender()">
            <fieldset>
                <label for="fname">First Name</label>
                <input type="text" name="fname" id="fname" autofocus>
                <span id="efname"></span>
                <br><br>
                <label for="lname">Last Name</label>
                <input type="text" name="lname" id="lname"> 
                <span id="elname"></span>
                <br><br>

                <label for="email">Email</label>
                <input type="email" name="email" id="email">
                <span id="eemail"></span>

                <br><br>
                <label for="gender">Gender</label>
                <input type="radio" name="gender" id="genderM" value="Male" onchange="clearError()">
                <label for="genderM">Male</label>
                <input type="radio" name="gender" id="genderF" value="Female" onchange="clearError()">
                <label for="genderF">Female</label>
                <span id="egender"></span>
                <br><br>

                <label for="pass">Password</label>
                <input type="password" name="pass" id="pass">
                <span id="eca"></span>
                <span id="esa"></span>
                <span id="ed"></span>
                <span id="esc"></span>
                <span id="el"></span>
                <br><br>

                <label for="cpass">Confirm Password</label>
                <input type="password" name="cpass" id="cpass">
                <span id="ecpass"></span>
                <br><br>

                <input type="submit" id="sub" value="Sign Up" onclick="validategender()">
                <br><br>
                
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </fieldset>
        </form>
    </div>
    <script src="script2.js"></script>
</body>
</html>
